# workflow_dispatch — mesmo comportamento que `.github/workflows/main.yml` (matrix por canal).
# Monorepo: paths em mb-ofertas/...

name: WhatsApp Bot (postar ofertas) — mb-ofertas

on:
  workflow_dispatch:

jobs:
  session-check:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.chk.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1
      - id: chk
        run: |
          if [ -d mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth ] && [ -n "$(ls -A mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth 2>/dev/null)" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

  send-channel:
    needs: session-check
    if: needs.session-check.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        channel: [health, tech, ofertas, faith]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Rodar bot — ${{ matrix.channel }}
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID_ALL: ${{ secrets.CHAT_ID_ALL }}
          CHAT_ID_HEALTH: ${{ secrets.CHAT_ID_HEALTH }}
          CHAT_ID_TECH: ${{ secrets.CHAT_ID_TECH }}
          CHAT_ID_OFERTAS: ${{ secrets.CHAT_ID_OFERTAS }}
          CHAT_ID_FAITH: ${{ secrets.CHAT_ID_FAITH }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: |
          set -e
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/.github/scripts/whatsapp-resolve-chat-id.sh"
          CHAT_ID="$(resolve_chat_id_for_channel "${{ matrix.channel }}")"
          if [ -z "$CHAT_ID" ]; then
            echo "::notice::Sem CHAT_ID para ${{ matrix.channel }} — ignorando."
            exit 0
          fi
          cd mb-ofertas/whatsapp-channel-bot
          export CHAT_ID CHANNEL_SLUG="${{ matrix.channel }}" SINGLE_RUN=true GITHUB_ACTIONS=true
          node src/index.js || echo "::warning::Falha no canal ${{ matrix.channel }}"

  no-session:
    needs: session-check
    if: needs.session-check.outputs.ok != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::Sem sessão WhatsApp no cache. Rode Init WhatsApp (escanear QR)."
          exit 1
