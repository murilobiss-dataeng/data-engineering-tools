# Só é usado se este repositório for a raiz (projeto só mb-ofertas).
# No monorepo data-engineering-tools use: .github/workflows/whatsapp-bot-init.yml na raiz.

name: Init WhatsApp (escanear QR)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd whatsapp-channel-bot
          npm install

      - name: Gerar QR, artifact imediato e aguardar escaneamento
        id: qr
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          set -e
          cd whatsapp-channel-bot
          if [ -d data ]; then
            find data -type f \( -name 'SingletonLock' -o -name 'SingletonCookie' -o -name 'SingletonSocket' \) -delete 2>/dev/null || true
          fi

          rebuild_qr_and_upload() {
            [ ! -f data/qr-url.txt ] && return 0
            printf '%s' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR WhatsApp</title></head><body style="margin:20px;font-family:sans-serif"><h2>Escaneie com o WhatsApp</h2><img src="' > "$GITHUB_WORKSPACE/qr.html"
            cat data/qr-url.txt | tr -d '\n' >> "$GITHUB_WORKSPACE/qr.html"
            printf '%s' '" width="280" alt="QR"/></body></html>' >> "$GITHUB_WORKSPACE/qr.html"
            node scripts/gha-qr-from-raw.cjs || true
            if node scripts/gha-upload-qr-artifact.cjs; then
              echo "artifact_uploaded=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Upload do artifact falhou nesta tentativa."
              echo "artifact_uploaded=false" >> "$GITHUB_OUTPUT"
            fi
          }

          rm -f data/qr-url.txt
          rm -f data/qr-raw.txt
          rm -f "$GITHUB_WORKSPACE/qr.html"
          rm -f "$GITHUB_WORKSPACE/qr-workflow.html"
          rm -f "$GITHUB_WORKSPACE/qr-workflow.png"
          node src/index.js &
          BOT_PID=$!
          echo "Aguardando arquivo do QR (até 2 min)..."
          for _ in $(seq 1 24); do
            sleep 5
            [ -f data/qr-url.txt ] && break
          done
          if [ ! -f data/qr-url.txt ]; then
            echo "qr_generated=false" >> "$GITHUB_OUTPUT"
            kill "$BOT_PID" 2>/dev/null || true
            echo "Timeout: arquivo do QR não apareceu. Rode o workflow de novo."
            exit 1
          fi
          echo "qr_generated=true" >> "$GITHUB_OUTPUT"
          DATAURL=$(cat data/qr-url.txt | tr -d '\n')

          echo ""
          echo "=== Onde achar o QR nesta execução ==="
          echo "URL da run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "1) Job init → Summary (imagem)  |  2) Rodapé da run → Artifacts → whatsapp-qr (baixe de novo se o QR renovar)"
          echo ""

          {
            echo "## Onde ver o QR Code"
            echo ""
            echo "### 1) Nesta página (mais rápido)"
            echo "No **menu à esquerda** desta execução do workflow, clique no job **init**."
            echo "Role a página do job: a **imagem do QR** deve aparecer abaixo (markdown com data URL)."
            echo ""
            echo "### 2) Arquivo para abrir no navegador"
            echo "Na **mesma** página da execução, seção **Artifacts**: baixe **whatsapp-qr**. O WhatsApp **renova o QR**; se demorar para baixar, **baixe de novo** — o artifact é republicado automaticamente quando o código mudar."
            echo ""
            echo "---"
            echo ""
            echo "### Imagem do QR"
            echo ""
            printf '![QR Code WhatsApp — escaneie em Aparelhos conectados](%s)\n' "$DATAURL"
            echo ""
            echo "---"
            echo ""
            echo "Depois disso o job **continua** até você escanear ou até ~8 min. Se o QR expirar no celular, aguarde o próximo upload ou baixe o artifact de novo."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Publicando artifact whatsapp-qr (1ª vez)..."
          rebuild_qr_and_upload

          FIRST_QR_SUM=$(sha256sum data/qr-url.txt | awk '{print $1}')
          (
            LAST="$FIRST_QR_SUM"
            while kill -0 "$BOT_PID" 2>/dev/null; do
              sleep 12
              [ ! -f data/qr-url.txt ] && continue
              s=$(sha256sum data/qr-url.txt | awk '{print $1}')
              [ -z "$s" ] && continue
              [ "$s" = "$LAST" ] && continue
              LAST="$s"
              echo "::notice::QR renovado pelo WhatsApp (expiração); republicando artifact — baixe o zip de novo."
              rebuild_qr_and_upload || true
            done
          ) &
          WATCH_PID=$!
          trap 'kill "$WATCH_PID" 2>/dev/null || true' EXIT

          echo "Aguardando escaneamento (até ~8 min). O QR pode renovar; use sempre o artifact mais recente."
          for i in $(seq 1 48); do
            if ! kill -0 "$BOT_PID" 2>/dev/null; then
              kill "$WATCH_PID" 2>/dev/null || true
              echo "Bot encerrou. Sessão salva no cache."
              exit 0
            fi
            if [ $((i % 6)) -eq 0 ]; then
              echo "⏳ Ainda aguardando (~$((i / 6)) min / 8). Se o QR expirou, baixe **whatsapp-qr** de novo ou veja o log (QR ASCII quando renovar)."
            fi
            sleep 10
          done
          kill "$WATCH_PID" 2>/dev/null || true
          echo "Timeout de espera. Se já escaneou, a sessão pode estar no cache; teste o workflow agendado."

      - name: Upload artifact (fallback se o upload imediato falhou)
        if: success() && hashFiles('qr.html') != '' && steps.qr.outputs.artifact_uploaded != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr
          path: qr.html
          overwrite: true
