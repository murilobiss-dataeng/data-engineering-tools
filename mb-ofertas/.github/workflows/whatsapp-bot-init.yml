# Espelho do workflow na raiz: `.github/workflows/whatsapp-bot-init.yml` (monorepo data-engineering-tools).

name: Init WhatsApp (escanear QR)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Iniciar bot e gerar ficheiros do QR
        id: qr
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHAT_ID_ALL: ${{ secrets.CHAT_ID_ALL }}
          CHAT_ID_HEALTH: ${{ secrets.CHAT_ID_HEALTH }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          set -e
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/.github/scripts/whatsapp-resolve-chat-id.sh"
          export CHAT_ID="$(resolve_chat_id_for_init)"
          cd mb-ofertas/whatsapp-channel-bot
          if [ -d data ]; then
            find data -type f \( -name 'SingletonLock' -o -name 'SingletonCookie' -o -name 'SingletonSocket' \) -delete 2>/dev/null || true
          fi

          pack_artifact_qr() {
            [ ! -f data/qr.png ] && return 1
            cp data/qr.png "$GITHUB_WORKSPACE/qr.png"
            printf '%s' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR WhatsApp</title></head><body style="margin:20px;font-family:sans-serif"><h2>Escaneie com o WhatsApp</h2><p style="color:#444;font-size:14px">Aparelhos conectados → Conectar um aparelho. Neste zip use só <strong>qr.png</strong> (ou abra <strong>qr.html</strong> na mesma pasta).</p><img style="image-rendering:pixelated;image-rendering:crisp-edges" src="qr.png" width="768" height="768" alt="QR WhatsApp"/></body></html>' > "$GITHUB_WORKSPACE/qr.html"
          }

          rm -f data/qr-url.txt data/qr-raw.txt data/qr.png
          rm -f "$GITHUB_WORKSPACE/qr.html" "$GITHUB_WORKSPACE/qr.png"

          setsid nohup node src/index.js >> bot.log 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/.whatsapp_bot_pid"
          disown || true

          echo "Aguardando primeiro QR (até 2 min)..."
          for _ in $(seq 1 24); do
            sleep 5
            [ -f data/qr.png ] && break
          done
          if [ ! -f data/qr.png ]; then
            echo "qr_generated=false" >> "$GITHUB_OUTPUT"
            kill "$(cat "$GITHUB_WORKSPACE/.whatsapp_bot_pid")" 2>/dev/null || true
            echo "Timeout: QR não foi gerado. Veja bot.log ou rode de novo."
            exit 1
          fi

          echo "Aguardando o PNG estabilizar (3s sem alteração; no máximo ~90s)..."
          stable=0
          for _ in $(seq 1 90); do
            [ ! -f data/qr.png ] && { sleep 1; continue; }
            h=$(sha256sum data/qr.png | awk '{print $1}')
            sleep 1
            h2=$(sha256sum data/qr.png | awk '{print $1}')
            if [ "$h" = "$h2" ] && [ -n "$h" ]; then
              stable=$((stable + 1))
            else
              stable=0
            fi
            if [ "$stable" -ge 3 ]; then
              break
            fi
          done

          pack_artifact_qr
          echo "qr_generated=true" >> "$GITHUB_OUTPUT"

          echo ""
          echo "URL da run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "## QR Code (artifact)"
            echo ""
            echo "Baixe **whatsapp-qr** (zip) em **Artifacts**. Contém só **qr.png** e **qr.html** (mesmo código de barras)."
            echo "Se o pareamento falhar, rode o workflow de novo."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar artifact whatsapp-qr
        if: success() && hashFiles('qr.png') != ''
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr
          path: |
            qr.png
            qr.html
          if-no-files-found: error

      - name: Aguardar escaneamento (até ~4 min)
        if: success() && steps.qr.outputs.qr_generated == 'true'
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHAT_ID_ALL: ${{ secrets.CHAT_ID_ALL }}
          CHAT_ID_HEALTH: ${{ secrets.CHAT_ID_HEALTH }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          set -e
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/.github/scripts/whatsapp-resolve-chat-id.sh"
          export CHAT_ID="$(resolve_chat_id_for_init)"
          cd mb-ofertas/whatsapp-channel-bot
          BOT_PID="$(cat "$GITHUB_WORKSPACE/.whatsapp_bot_pid")"
          if ! kill -0 "$BOT_PID" 2>/dev/null; then
            echo "::warning::Bot não está ativo (PID $BOT_PID). Tente escanear com o QR já baixado ou rode o workflow de novo."
            exit 0
          fi
          echo "Aguardando escaneamento (até ~4 min)..."
          for i in $(seq 1 24); do
            if ! kill -0 "$BOT_PID" 2>/dev/null; then
              echo "Bot encerrou. Sessão salva no cache."
              exit 0
            fi
            if [ $((i % 6)) -eq 0 ]; then
              echo "⏳ ~$((i / 6)) min / 4 — use o **qr.png** do artifact desta run."
            fi
            sleep 10
          done
          echo "Timeout. Se já escaneou, a sessão pode estar no cache."
