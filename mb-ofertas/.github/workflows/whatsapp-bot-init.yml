# Espelho: `.github/workflows/whatsapp-bot-init.yml` na raiz do monorepo.

name: Init WhatsApp (escanear QR)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/node_modules
          key: npm-whatsapp-bot-${{ hashFiles('mb-ofertas/whatsapp-channel-bot/package-lock.json') }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install --prefer-offline --no-audit --no-fund

      - name: Gerar QR (~1 min)
        id: qr
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHAT_ID_ALL: ${{ secrets.CHAT_ID_ALL }}
          CHAT_ID_HEALTH: ${{ secrets.CHAT_ID_HEALTH }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
          WHATSAPP_ALLOW_QR_PAIRING: "true"
        run: |
          set -e
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/.github/scripts/whatsapp-resolve-chat-id.sh"
          export CHAT_ID="$(resolve_chat_id_for_init)"
          cd mb-ofertas/whatsapp-channel-bot

          find data -type f \( -name 'SingletonLock' -o -name 'SingletonCookie' -o -name 'SingletonSocket' \) -delete 2>/dev/null || true
          rm -rf data/.wwebjs_auth
          rm -f data/qr-url.txt data/qr-raw.txt data/qr.png bot.log
          rm -f "$GITHUB_WORKSPACE/qr.html" "$GITHUB_WORKSPACE/qr.png"

          setsid nohup node src/index.js >> bot.log 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/.whatsapp_bot_pid"
          disown || true

          echo "Aguardando QR (máx. 50s)..."
          for _ in $(seq 1 25); do
            sleep 2
            if [ -f bot.log ] && grep -q "WhatsApp conectado" bot.log 2>/dev/null; then
              echo "already_connected=true" >> "$GITHUB_OUTPUT"
              echo "Sessão conectada sem novo QR."
              exit 0
            fi
            [ -f data/qr.png ] && break
          done

          if [ ! -f data/qr.png ]; then
            echo "qr_generated=false" >> "$GITHUB_OUTPUT"
            kill "$(cat "$GITHUB_WORKSPACE/.whatsapp_bot_pid")" 2>/dev/null || true
            echo "::error::QR não gerado em 50s. Veja bot.log."
            tail -30 bot.log || true
            exit 1
          fi

          sleep 2
          cp data/qr.png "$GITHUB_WORKSPACE/qr.png"
          printf '%s' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR WhatsApp</title></head><body style="margin:20px;font-family:sans-serif"><h2>Escaneie agora</h2><p>Aparelhos conectados → Conectar um aparelho. Escaneie em até <strong>60s</strong>.</p><img style="image-rendering:pixelated;image-rendering:crisp-edges" src="qr.png" width="768" height="768" alt="QR"/></body></html>' > "$GITHUB_WORKSPACE/qr.html"
          echo "qr_generated=true" >> "$GITHUB_OUTPUT"

          {
            echo "## QR Code"
            echo ""
            echo "Baixe o artifact **whatsapp-qr** e escaneie em até **60s**."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar artifact whatsapp-qr
        if: success() && steps.qr.outputs.qr_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr
          path: |
            qr.png
            qr.html
          if-no-files-found: error

      - name: Aguardar escaneamento (máx. 90s)
        if: success() && steps.qr.outputs.qr_generated == 'true'
        run: |
          set -e
          cd mb-ofertas/whatsapp-channel-bot
          BOT_PID="$(cat "$GITHUB_WORKSPACE/.whatsapp_bot_pid")"
          if ! kill -0 "$BOT_PID" 2>/dev/null; then
            echo "Bot já encerrou. Sessão no cache."
            exit 0
          fi
          for _ in $(seq 1 18); do
            if ! kill -0 "$BOT_PID" 2>/dev/null; then
              echo "Bot encerrou. Sessão salva no cache."
              exit 0
            fi
            if [ -f bot.log ] && grep -q "WhatsApp conectado" bot.log 2>/dev/null; then
              sleep 3
              kill "$BOT_PID" 2>/dev/null || true
              echo "Pareamento OK. Sessão salva no cache."
              exit 0
            fi
            sleep 5
          done
          kill "$BOT_PID" 2>/dev/null || true
          echo "::warning::Tempo de scan esgotado (90s). Se escaneou, rode postar ofertas para testar."
