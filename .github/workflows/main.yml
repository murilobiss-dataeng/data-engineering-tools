# Envia produtos aprovados por canal (slug da categoria) para o WhatsApp.
# Um único job percorre health → tech → ofertas → faith → fitness em sequência,
# reutilizando a mesma sessão (sem corrida no cache do LocalAuth).
#
# Secrets:
#   API_URL — ex.: https://sua-api.onrender.com/api/products/feed (sem query; o bot usa ?channelSlug= por canal)
#   CHAT_ID_HEALTH, CHAT_ID_TECH, CHAT_ID_OFERTAS, CHAT_ID_FAITH, CHAT_ID_FITNESS — ID do canal (ex.: 120363405814099508@newsletter)
#   Canais sem secret ficam de fora (mensagem no log).
#
# Primeira vez: workflow "Init WhatsApp (escanear QR)".

name: WhatsApp Bot (postar ofertas)

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Verificar patch getLastMsgKeyForAction
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          grep -q "getLastMsgKeyForAction" node_modules/whatsapp-web.js/src/util/Injected/Utils.js && echo "Patch do canal aplicado." || echo "::warning::Patch do canal não encontrado em Utils.js"

      - name: Verificar sessão (rodar Init se não existir)
        id: session
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          if [ -d data/.wwebjs_auth ] && [ -n "$(ls -A data/.wwebjs_auth 2>/dev/null)" ]; then
            echo "session_ok=true" >> $GITHUB_OUTPUT
          else
            echo "session_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Rodar bot (single-run) por canal
        if: steps.session.outputs.session_ok == 'true'
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          for channel in health tech ofertas faith fitness; do
            case "$channel" in
              health) CHAT_ID="${{ secrets.CHAT_ID_HEALTH }}" ;;
              tech) CHAT_ID="${{ secrets.CHAT_ID_TECH }}" ;;
              ofertas) CHAT_ID="${{ secrets.CHAT_ID_OFERTAS }}" ;;
              faith) CHAT_ID="${{ secrets.CHAT_ID_FAITH }}" ;;
              fitness) CHAT_ID="${{ secrets.CHAT_ID_FITNESS }}" ;;
            esac
            if [ -z "$CHAT_ID" ]; then
              echo "::notice::CHAT_ID não configurado para o canal $channel — ignorando."
              continue
            fi
            export CHAT_ID CHANNEL_SLUG="$channel" SINGLE_RUN=true GITHUB_ACTIONS=true
            node src/index.js
          done

      - name: Sessão não encontrada
        if: steps.session.outputs.session_ok != 'true'
        run: |
          echo "::error::Nenhuma sessão do WhatsApp no cache. Rode o workflow **Init WhatsApp (escanear QR)** uma vez, escaneie o QR e depois este job voltará a funcionar."
          exit 1
