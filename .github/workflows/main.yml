# Um único job, modo rodízio: em cada rodada envia até 1 post em health → tech → ofertas → faith,
# depois espera DELAY_BETWEEN_POSTS_MINUTES (padrão 10) antes da próxima rodada (variável ROUND_ROBIN_CHANNELS).

name: WhatsApp Bot (postar ofertas)

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - name: Verificar sessão WhatsApp
        run: |
          if [ ! -d mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth ] || [ -z "$(ls -A mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth 2>/dev/null)" ]; then
            echo "::error::Sem sessão no cache. Rode **Init WhatsApp (escanear QR)**."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm install (patch whatsapp-web.js)
        working-directory: mb-ofertas/whatsapp-channel-bot
        run: npm install

      - name: Verificar patch ChannelUtils
        working-directory: mb-ofertas/whatsapp-channel-bot
        run: grep -q 'getRoleByIdentifier = function' node_modules/whatsapp-web.js/src/util/Injected/Store.js

      - name: Rodízio entre canais (1 post por canal por rodada + intervalo)
        working-directory: mb-ofertas/whatsapp-channel-bot
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID_HEALTH: ${{ secrets.CHAT_ID_HEALTH }}
          CHAT_ID_TECH: ${{ secrets.CHAT_ID_TECH }}
          CHAT_ID_OFERTAS: ${{ secrets.CHAT_ID_OFERTAS }}
          CHAT_ID_FAITH: ${{ secrets.CHAT_ID_FAITH }}
          ROUND_ROBIN_CHANNELS: "true"
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: node src/index.js
