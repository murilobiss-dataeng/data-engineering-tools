# Envia produtos aprovados por canal (slug da categoria) para o WhatsApp.
#
# Secrets:
#   API_URL — feed da API (sem query; o bot usa ?channelSlug= por canal)
#   CHAT_ID_HEALTH, CHAT_ID_TECH, CHAT_ID_OFERTAS, CHAT_ID_FAITH — preferencial: ID ...@newsletter por canal
#   CHAT_ID_ALL — fallback opcional (multilinha mb.health: …). Links só com código 0029… podem falhar; use @newsletter quando possível
#   CHAT_IDS — fallback: quatro IDs separados por vírgula (health,tech,ofertas,faith)
#
# Jobs por canal (matrix) com max-parallel: 1 — uma única sessão LocalAuth; paralelo real quebraria o cache/sessão.

name: WhatsApp Bot (postar ofertas)

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  session-check:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.chk.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1
      - id: chk
        run: |
          if [ -d mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth ] && [ -n "$(ls -A mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth 2>/dev/null)" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

  send-channel:
    needs: session-check
    if: needs.session-check.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        channel: [health, tech, ofertas, faith]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Verificar patch canal / WhatsApp Web
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          grep -q "getLastMsgKeyForAction" node_modules/whatsapp-web.js/src/util/Injected/Utils.js && echo "Patch newsletter OK."
          grep -q "roleFromInvite" node_modules/whatsapp-web.js/src/util/Injected/Utils.js && echo "Patch getRoleByIdentifier OK."

      - name: Rodar bot — canal ${{ matrix.channel }}
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID_ALL: ${{ secrets.CHAT_ID_ALL }}
          CHAT_ID_HEALTH: ${{ secrets.CHAT_ID_HEALTH }}
          CHAT_ID_TECH: ${{ secrets.CHAT_ID_TECH }}
          CHAT_ID_OFERTAS: ${{ secrets.CHAT_ID_OFERTAS }}
          CHAT_ID_FAITH: ${{ secrets.CHAT_ID_FAITH }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: |
          set -e
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/.github/scripts/whatsapp-resolve-chat-id.sh"
          CHAT_ID="$(resolve_chat_id_for_channel "${{ matrix.channel }}")"
          if [ -z "$CHAT_ID" ]; then
            echo "::notice::CHAT_ID não configurado para ${{ matrix.channel }} — ignorando."
            exit 0
          fi
          echo "::notice::CHANNEL_SLUG=${{ matrix.channel }} (use secrets CHAT_ID_* com ...@newsletter)"
          cd mb-ofertas/whatsapp-channel-bot
          export CHAT_ID CHANNEL_SLUG="${{ matrix.channel }}" SINGLE_RUN=true GITHUB_ACTIONS=true
          node src/index.js

  no-session:
    needs: session-check
    if: needs.session-check.outputs.ok != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::Nenhuma sessão do WhatsApp no cache. Rode **Init WhatsApp (escanear QR)** uma vez."
          exit 1
