# Envia produtos aprovados (feed da API) para o canal WhatsApp a cada 10 minutos.
# Secrets: API_URL, CHAT_ID (recomendado) ou CHAT_IDS. Na primeira vez rode "Init WhatsApp (escanear QR)".

name: WhatsApp Bot (postar ofertas)

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Verificar sessão (rodar Init se não existir)
        id: session
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          if [ -d data/.wwebjs_auth ] && [ -n "$(ls -A data/.wwebjs_auth 2>/dev/null)" ]; then
            echo "session_ok=true" >> $GITHUB_OUTPUT
          else
            echo "session_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Rodar bot (single-run)
        if: steps.session.outputs.session_ok == 'true'
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          node src/index.js

      - name: Sessão não encontrada
        if: steps.session.outputs.session_ok != 'true'
        run: |
          echo "::error::Nenhuma sessão do WhatsApp no cache. Rode o workflow **Init WhatsApp (escanear QR)** uma vez, escaneie o QR e depois este job voltará a funcionar."
          exit 1
