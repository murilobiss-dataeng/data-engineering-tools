# Opcional: roda os 4 canais em sequência num único job (manual). Não define CHAT_IDS nem CHAT_ID_ALL.

name: WhatsApp — todos os canais (manual)

on:
  workflow_dispatch:

concurrency:
  group: whatsapp-bot-session
  cancel-in-progress: false

jobs:
  send-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - name: Verificar sessão
        run: |
          if [ ! -d mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth ] || [ -z "$(ls -A mb-ofertas/whatsapp-channel-bot/data/.wwebjs_auth 2>/dev/null)" ]; then
            echo "::error::Sem sessão. Rode Init WhatsApp."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm install
        working-directory: mb-ofertas/whatsapp-channel-bot
        run: npm install

      - name: Rodar health → tech → ofertas → faith
        working-directory: mb-ofertas/whatsapp-channel-bot
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID_HEALTH: ${{ secrets.CHAT_ID_HEALTH }}
          CHAT_ID_TECH: ${{ secrets.CHAT_ID_TECH }}
          CHAT_ID_OFERTAS: ${{ secrets.CHAT_ID_OFERTAS }}
          CHAT_ID_FAITH: ${{ secrets.CHAT_ID_FAITH }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          set -e
          run_one() {
            local slug="$1"
            local cid="$2"
            if [ -z "$cid" ]; then
              echo "::notice::Sem CHAT_ID para $slug — pulando."
              return 0
            fi
            export CHAT_ID="$cid" CHANNEL_SLUG="$slug"
            node src/index.js
          }
          run_one health "$CHAT_ID_HEALTH"
          run_one tech "$CHAT_ID_TECH"
          run_one ofertas "$CHAT_ID_OFERTAS"
          run_one faith "$CHAT_ID_FAITH"
