# Rode uma vez manualmente para criar a sessão do WhatsApp (escanear QR).
# O QR aparece no Resumo do job (Summary) — abra a execução e veja o QR na página.

name: Init WhatsApp (escanear QR)

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Gerar QR (bot em background)
        id: qr
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          node src/index.js &
          BOT_PID=$!
          for i in $(seq 1 24); do
            sleep 5
            if [ -f data/qr-url.txt ]; then
              echo "qr_path=data/qr-url.txt" >> $GITHUB_OUTPUT
              echo "QR gerado." >> $GITHUB_STEP_SUMMARY
              break
            fi
          done
          wait $BOT_PID || true

      - name: Mostrar QR no resumo do job
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          if [ -f data/qr-url.txt ]; then
            URL=$(cat data/qr-url.txt | tr -d '\n')
            {
              echo "## Escaneie o QR com o WhatsApp"
              echo ""
              echo "Abra **Aparelhos conectados** no celular e escaneie:"
              echo ""
              echo "<img src=\"$URL\" width=\"280\" alt=\"QR Code\"/>"
              echo ""
              echo "Se a imagem não aparecer, baixe o artifact **whatsapp-qr** (final da página) e abra o qr.html no navegador."
              echo ""
              echo "Aguarde o job concluir após escanear (sessão será salva no cache)."
            } >> $GITHUB_STEP_SUMMARY
          else
            echo "## QR não gerado" >> $GITHUB_STEP_SUMMARY
            echo "Rode o workflow novamente." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload qr.html (alternativa)
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          if [ -f data/qr-url.txt ]; then
            URL=$(cat data/qr-url.txt | tr -d '\n')
            echo "<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>QR WhatsApp</title></head><body style=\"margin:20px;font-family:sans-serif\"><h2>Escaneie com o WhatsApp</h2><p>Aparelhos conectados → Conectar um aparelho</p><img src=\"$URL\" width=\"280\" alt=\"QR\"/></body></html>" > "$GITHUB_WORKSPACE/qr.html"
          fi

      - name: Fazer upload do QR
        if: hashFiles('qr.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr
          path: qr.html
