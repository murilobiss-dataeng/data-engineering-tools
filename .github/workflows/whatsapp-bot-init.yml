# Rode uma vez manualmente para criar a sessão do WhatsApp (escanear QR).
# Um único step inicia o bot, gera o link do QR (visível no resumo) e só termina quando você escanear (ou após 8 min).
# O artifact só é enviado no step seguinte, depois que este step termina (por isso o job precisa de timeout alto).

name: Init WhatsApp (escanear QR)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  init:
    runs-on: ubuntu-latest
    # 2 min espera QR + 8 min loop + npm install — com 10 min o job era cancelado ANTES do "Upload artifact"
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Gerar QR, link e aguardar escaneamento
        id: qr
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          node src/index.js &
          BOT_PID=$!
          echo "Aguardando arquivo do QR (até 2 min)..."
          for i in $(seq 1 24); do
            sleep 5
            [ -f data/qr-url.txt ] && break
          done
          if [ ! -f data/qr-url.txt ]; then
            echo "qr_generated=false" >> $GITHUB_OUTPUT
            kill $BOT_PID 2>/dev/null || true
            echo "Timeout: arquivo do QR não apareceu. Rode o workflow de novo."
            exit 1
          fi
          echo "qr_generated=true" >> $GITHUB_OUTPUT
          DATAURL=$(cat data/qr-url.txt | tr -d '\n')
          # QR direto no resumo do job (sem precisar baixar nada)
          {
            echo "## Escaneie o QR com o WhatsApp"
            echo ""
            echo "Abra **Aparelhos conectados** no celular e escaneie. Este step termina quando o bot salvar a sessão (ou em até 8 min)."
            echo ""
            printf '![QR](%s)\n' "$DATAURL"
          } >> $GITHUB_STEP_SUMMARY
          # Um único HTML com o QR (artifact opcional)
          printf '%s' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR WhatsApp</title></head><body style="margin:20px;font-family:sans-serif"><h2>Escaneie com o WhatsApp</h2><img src="' > "$GITHUB_WORKSPACE/qr.html"
          cat data/qr-url.txt | tr -d '\n' >> "$GITHUB_WORKSPACE/qr.html"
          printf '%s' '" width="280" alt="QR"/></body></html>' >> "$GITHUB_WORKSPACE/qr.html"
          echo "qr.html criado na raiz do workspace; o próximo step fará o upload do artifact."
          echo "Aguardando você escanear... (até 8 min)"
          for i in $(seq 1 48); do
            if ! kill -0 $BOT_PID 2>/dev/null; then
              echo "Bot encerrou. Sessão salva no cache."
              exit 0
            fi
            sleep 10
          done
          echo "Timeout. Se já escaneou, a sessão pode ter sido salva. Rode o workflow agendado para testar."

      - name: Upload artifact (qr.html)
        if: success() && hashFiles('qr.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr
          path: qr.html
