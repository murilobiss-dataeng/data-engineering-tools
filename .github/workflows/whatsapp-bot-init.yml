# Rode uma vez manualmente para criar a sessão do WhatsApp (escanear QR).
# O artifact é publicado num passo YAML logo após gerar os ficheiros (não espera o fim da espera longa).

name: Init WhatsApp (escanear QR)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: mb-ofertas/whatsapp-channel-bot/data
          key: whatsapp-session-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do bot
        run: |
          cd mb-ofertas/whatsapp-channel-bot
          npm install

      - name: Iniciar bot e gerar ficheiros do QR
        id: qr
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          set -e
          cd mb-ofertas/whatsapp-channel-bot
          # Cache do GHA pode restaurar locks do Chromium (job cancelado) → "profile appears to be in use".
          if [ -d data ]; then
            find data -type f \( -name 'SingletonLock' -o -name 'SingletonCookie' -o -name 'SingletonSocket' \) -delete 2>/dev/null || true
          fi

          rebuild_qr_files() {
            [ ! -f data/qr-url.txt ] && return 0
            printf '%s' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR WhatsApp</title></head><body style="margin:20px;font-family:sans-serif"><h2>Escaneie com o WhatsApp</h2><img style="image-rendering:pixelated;image-rendering:crisp-edges" src="' > "$GITHUB_WORKSPACE/qr.html"
            cat data/qr-url.txt | tr -d '\n' >> "$GITHUB_WORKSPACE/qr.html"
            printf '%s' '" width="768" height="768" alt="QR WhatsApp"/></body></html>' >> "$GITHUB_WORKSPACE/qr.html"
            node scripts/gha-qr-from-raw.cjs || true
          }

          # Cache pode trazer arquivos de QR antigos: o loop disparava cedo e o upload falhava antes do QR novo.
          rm -f data/qr-url.txt
          rm -f data/qr-raw.txt
          rm -f "$GITHUB_WORKSPACE/qr.html"
          rm -f "$GITHUB_WORKSPACE/qr-workflow.html"
          rm -f "$GITHUB_WORKSPACE/qr-workflow.png"

          # setsid + nohup: o bot sobrevive ao fim deste step; o próximo passo publica o artifact via upload-artifact@v4.
          setsid nohup node src/index.js >> bot.log 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/.whatsapp_bot_pid"
          disown || true

          echo "Aguardando arquivo do QR (até 2 min)..."
          for _ in $(seq 1 24); do
            sleep 5
            [ -f data/qr-url.txt ] && break
          done
          if [ ! -f data/qr-url.txt ]; then
            echo "qr_generated=false" >> "$GITHUB_OUTPUT"
            kill "$(cat "$GITHUB_WORKSPACE/.whatsapp_bot_pid")" 2>/dev/null || true
            echo "Timeout: arquivo do QR não apareceu. Rode o workflow de novo."
            exit 1
          fi
          echo "qr_generated=true" >> "$GITHUB_OUTPUT"
          DATAURL=$(cat data/qr-url.txt | tr -d '\n')

          echo ""
          echo "=== Onde achar o QR nesta execução ==="
          echo "URL da run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "1) Job init → Summary (imagem)  |  2) Passo seguinte → Artifacts → whatsapp-qr (zip, logo após este passo)"
          echo ""

          {
            echo "## Onde ver o QR Code"
            echo ""
            echo "### 1) Nesta página (mais rápido)"
            echo "No **menu à esquerda** desta execução do workflow, clique no job **init**."
            echo "Role a página do job: a **imagem do QR** deve aparecer abaixo (markdown com data URL)."
            echo ""
            echo "### 2) Arquivo para abrir no navegador"
            echo "O **próximo passo** publica o artifact **whatsapp-qr** (zip) — **não** precisa esperar o fim do job."
            echo ""
            echo "---"
            echo ""
            echo "### Imagem do QR"
            echo ""
            printf '![QR Code WhatsApp — escaneie em Aparelhos conectados](%s)\n' "$DATAURL"
            echo ""
            echo "---"
            echo ""
            echo "Depois disso o job **continua** até você escanear ou até ~4 min. Se o QR expirar no celular, use o artifact **final** (último passo) ou a imagem no Summary."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Gerando qr.html e PNG no workspace (1ª vez)..."
          rebuild_qr_files

      - name: Publicar artifact whatsapp-qr (logo após gerar QR)
        if: success() && hashFiles('qr.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr
          path: |
            qr.html
            qr-workflow.html
            qr-workflow.png
            mb-ofertas/whatsapp-channel-bot/data/qr.png
          if-no-files-found: warn
          overwrite: true

      - name: Aguardar escaneamento (até ~4 min)
        if: success() && steps.qr.outputs.qr_generated == 'true'
        env:
          API_URL: ${{ secrets.API_URL }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SINGLE_RUN: "true"
          GITHUB_ACTIONS: "true"
        run: |
          set -e
          cd mb-ofertas/whatsapp-channel-bot
          BOT_PID="$(cat "$GITHUB_WORKSPACE/.whatsapp_bot_pid")"

          rebuild_qr_files() {
            [ ! -f data/qr-url.txt ] && return 0
            printf '%s' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR WhatsApp</title></head><body style="margin:20px;font-family:sans-serif"><h2>Escaneie com o WhatsApp</h2><img style="image-rendering:pixelated;image-rendering:crisp-edges" src="' > "$GITHUB_WORKSPACE/qr.html"
            cat data/qr-url.txt | tr -d '\n' >> "$GITHUB_WORKSPACE/qr.html"
            printf '%s' '" width="768" height="768" alt="QR WhatsApp"/></body></html>' >> "$GITHUB_WORKSPACE/qr.html"
            node scripts/gha-qr-from-raw.cjs || true
          }

          if ! kill -0 "$BOT_PID" 2>/dev/null; then
            echo "::warning::Processo do bot não está ativo (PID $BOT_PID). O runner pode ter encerrado processos em background; se o zip já foi publicado, tente escanear."
            exit 0
          fi

          FIRST_QR_SUM=$(sha256sum data/qr-url.txt | awk '{print $1}')
          (
            LAST="$FIRST_QR_SUM"
            while kill -0 "$BOT_PID" 2>/dev/null; do
              sleep 12
              [ ! -f data/qr-url.txt ] && continue
              s=$(sha256sum data/qr-url.txt | awk '{print $1}')
              [ -z "$s" ] && continue
              [ "$s" = "$LAST" ] && continue
              LAST="$s"
              echo "::notice::QR renovado pelo WhatsApp; ficheiros no workspace atualizados (novo zip no passo final)."
              rebuild_qr_files || true
            done
          ) &
          WATCH_PID=$!
          trap 'kill "$WATCH_PID" 2>/dev/null || true' EXIT

          echo "Aguardando escaneamento (até ~4 min). O QR pode renovar; o último zip reflete o estado no fim da espera."
          for i in $(seq 1 24); do
            if ! kill -0 "$BOT_PID" 2>/dev/null; then
              kill "$WATCH_PID" 2>/dev/null || true
              echo "Bot encerrou. Sessão salva no cache."
              exit 0
            fi
            if [ $((i % 6)) -eq 0 ]; then
              echo "⏳ Ainda aguardando (~$((i / 6)) min / 4). Se o QR expirou, baixe **whatsapp-qr** de novo no fim do job (use **qr-workflow.png** para escanear)."
            fi
            sleep 10
          done
          kill "$WATCH_PID" 2>/dev/null || true
          echo "Timeout de espera. Se já escaneou, a sessão pode estar no cache; teste o workflow agendado."

      - name: Publicar artifact whatsapp-qr (estado final / QR renovado)
        if: always() && hashFiles('qr.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-qr
          path: |
            qr.html
            qr-workflow.html
            qr-workflow.png
            mb-ofertas/whatsapp-channel-bot/data/qr.png
          if-no-files-found: warn
          overwrite: true
